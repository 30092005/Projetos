{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <h2>Agenda de {{ request.user.email }}</h2>
  <div class="row">
    {% for d in days %}
      <div class="col-md-2 p-2 border {% if d.is_today %}bg-info{% endif %}">
        <strong>{{ d.day }}</strong><br>
        {{ d.weekday }}<br>
        {% if d.holiday %}<span class="text-danger">{{ d.holiday }}</span>{% endif %}
      </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
